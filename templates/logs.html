<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logs - Boseh Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .logs-page-container {
            width: 95vw;
            height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 2px solid rgba(0, 174, 239, 0.1);
            padding-bottom: 1rem;
        }

        .logs-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logs-title h1 {
            font-family: 'Outfit', sans-serif;
            color: var(--primary-blue);
            font-size: 1.8rem;
            font-weight: 800;
        }

        .back-btn {
            background: #f1f5f9;
            color: #64748b;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #e2e8f0;
            color: #334155;
            transform: translateX(-5px);
        }

        .log-display-area {
            flex: 1;
            background: #0f172a;
            border-radius: 20px;
            padding: 1.2rem;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 4px 15px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .log-viewer-container {
            flex: 1;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 15px;
        }

        .log-entry {
            display: flex;
            gap: 12px;
            padding: 4px 10px;
            border-radius: 6px;
            transition: background 0.2s;
            border-left: 3px solid transparent;
        }

        .log-entry:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .log-time { color: #64748b; min-width: 155px; font-weight: 500; }
        .log-cat { 
            font-weight: 800; 
            min-width: 85px; 
            text-align: center;
            border-radius: 4px;
            font-size: 0.7rem;
            padding: 2px 6px;
            height: fit-content;
        }
        
        .cat-mqtt { background: #0369a1; color: #e0f2fe; }
        .cat-system { background: #5b21b6; color: #ede9fe; }
        .cat-iot { background: #92400e; color: #fef3c7; }
        .cat-payment { background: #166534; color: #dcfce7; }
        .cat-mqtt-remote { background: #be123c; color: #fff1f2; }
        
        .log-msg { color: #f1f5f9; white-space: pre-wrap; word-break: break-all; flex: 1; }
        
        .level-error { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .level-error .log-msg { color: #f87171; font-weight: 600; }
        .level-warning { border-left-color: #f59e0b; }
        .level-warning .log-msg { color: #fbbf24; }

        /* Custom Scrollbar */
        .log-viewer-container::-webkit-scrollbar { width: 8px; }
        .log-viewer-container::-webkit-scrollbar-track { background: #0f172a; }
        .log-viewer-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .log-viewer-container::-webkit-scrollbar-thumb:hover { background: #475569; }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #334155;
        }

        .btn-action {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-refresh { background: #38bdf8; color: #082f49; }
        .btn-clear { background: #334155; color: #e2e8f0; }

        .btn-action:hover { filter: brightness(1.1); transform: translateY(-2px); }
    </style>
</head>
<body style="background: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div class="logs-page-container">
        <header class="logs-header">
            <div class="logs-title">
                <div style="background: #1e293b; color: #38bdf8; width: 50px; height: 50px; border-radius: 12px; display: flex; justify-content: center; align-items: center;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                </div>
                <h1>System Activity Logs</h1>
            </div>
            <a href="/maintenance" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Kembali ke Maintenance
            </a>
        </header>

        <div class="log-display-area">
            <div class="log-viewer-container" id="logViewer">
                <div class="log-entry"><span class="log-msg">Menghubungkan ke sistem log...</span></div>
            </div>
            
            <div class="controls">
                <button onclick="updateLogs()" class="btn-action btn-refresh">Refresh Log</button>
                <button onclick="clearLogs()" class="btn-action btn-clear">Bersihkan Tampilan</button>
                <div style="flex: 1;"></div>
                <div id="statusIndicator" style="display: flex; align-items: center; gap: 8px; color: #64748b; font-size: 0.8rem; font-weight: 600;">
                    <span style="width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block;"></span>
                    Live Monitoring Active (5s)
                </div>
            </div>
        </div>
    </div>

    <script>
        async function updateLogs() {
            try {
                const response = await fetch('/api/logs');
                const data = await response.json();
                const container = document.getElementById('logViewer');
                if (!container) return;

                let html = '';
                data.logs.forEach(log => {
                    const catClass = `cat-${log.category.toLowerCase()}`;
                    const levelClass = `level-${log.level.toLowerCase()}`;
                    html += `
                        <div class="log-entry ${levelClass}">
                            <span class="log-time">${log.timestamp}</span>
                            <span class="log-cat ${catClass}">${log.category}</span>
                            <span class="log-msg">${log.message}</span>
                        </div>
                    `;
                });
                
                const isAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;
                container.innerHTML = html;
                if (isAtBottom) {
                    container.scrollTop = container.scrollHeight;
                }
            } catch (err) {
                console.warn('Failed to fetch logs:', err);
            }
        }

        function clearLogs() {
            document.getElementById('logViewer').innerHTML = '<div class="log-entry"><span class="log-msg">Tampilan dibersihkan. Menunggu data baru...</span></div>';
        }

        // Initial load
        updateLogs();
        // Auto refresh every 5 seconds
        setInterval(updateLogs, 5000);
    </script>
</body>
</html>
