<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boseh Admin - Kelola Sepeda</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root {
            --primary-blue: #00aeef;
            --bg-glass: rgba(255, 255, 255, 0.9);
        }
        html, body {
            height: auto !important;
            overflow-y: auto !important;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%) !important;
            min-height: 100vh !important;
            height: auto !important;
            display: block !important;
            padding: 20px;
        }
        .admin-page {
            max-width: 800px;
            width: 100%;
            margin: 40px auto; /* Centering with margin */
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .admin-header {
            margin-bottom: 2rem;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 1.5rem;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            margin-bottom: 1.5rem;
            color: #666;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--primary-blue); }
        input, select {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1.5px solid #eee;
            font-size: 1rem;
            transition: border-color 0.2s;
            outline: none;
            background: white;
        }
        input:focus { border-color: var(--primary-blue); }
        .save-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            box-shadow: 0 10px 20px rgba(0, 174, 239, 0.3);
        }
        .save-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 174, 239, 0.4);
            filter: brightness(1.1);
        }

        @media (max-width: 768px) {
            .admin-page { padding: 1.5rem; border-radius: 20px; }
        }
    </style>
</head>
<body>
    <div id="navModal" class="modal-overlay" style="display: none;" onclick="toggleNavModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="text-align: center; margin-bottom: 25px; color: #1e3a8a; font-weight: 700;">Menu Pengaturan</h2>
            <div style="grid-template-columns: 1fr; display: grid; gap: 15px;">
                <a href="/" style="text-decoration: none; display: flex; align-items: center; gap: 15px; padding: 15px; background: #f0fdf4; border-radius: 12px; border: 1.5px solid #dcfce7; transition: all 0.2s;">
                    <div style="background: #ffffff; padding: 10px; border-radius: 10px; color: #166534;">🏠</div>
                    <div>
                        <div style="font-weight: 700; color: #334155;">Dashboard Utama</div>
                        <div style="font-size: 0.8rem; color: #64748b;">Kembali ke antarmuka utama</div>
                    </div>
                </a>
                <a href="/maintenance" style="text-decoration: none; display: flex; align-items: center; gap: 15px; padding: 15px; background: #fafaf9; border-radius: 12px; border: 1.5px solid #e7e5e4; transition: all 0.2s;">
                    <div style="background: #fef3c7; padding: 10px; border-radius: 10px; color: #b45309;">🔧</div>
                    <div>
                        <div style="font-weight: 700; color: #334155;">Device Maintenance</div>
                        <div style="font-size: 0.8rem; color: #64748b;">Monitoring IoT dan hardware</div>
                    </div>
                </a>
                <button onclick="toggleNavModal()" style="margin-top: 10px; padding: 12px; border: none; background: #f1f5f9; border-radius: 8px; font-weight: 700; color: #64748b; cursor: pointer;">Tutup Menu</button>
            </div>
        </div>
    </div>

    <div class="admin-page">
        <div class="admin-header" style="display: flex; gap: 20px; align-items: center;">
            <img src="{{ url_for('static', filename='img/dishub_logo.png') }}" alt="DISHUB Logo" style="height: 60px; cursor: pointer;" onclick="toggleNavModal()">
            <div style="flex: 1;">
                <h1 style="color: var(--primary-blue); margin: 0; font-size: 1.8rem;">Kelola Stasiun Boseh</h1>
                <p style="color: #666; margin: 0;">Kelola pengaturan stasiun dan kredensial API.</p>
            </div>
        </div>
        
        <div style="margin-top: 1rem; padding-top: 0.5rem;">
            <h3 style="color: #444; margin-bottom: 1.5rem;">Konfigurasi Stasiun</h3>
            <form action="{{ url_for('update_settings') }}" method="POST" style="display: flex; flex-direction: column; gap: 1.2rem;">
                <div>
                    <label style="display: block; font-weight: 700; margin-bottom: 0.5rem; color: #555; font-size: 0.9rem;">Nama Stasiun</label>
                    <input type="text" name="station_name" value="{{ settings.station_name }}" placeholder="Contoh: Station Dago">
                </div>
                
                <div>
                    <label style="display: block; font-weight: 700; margin-bottom: 0.5rem; color: #555; font-size: 0.9rem;">Alamat Stasiun</label>
                    <input type="text" name="station_address" value="{{ settings.station_address }}" placeholder="Alamat lengkap stasiun">
                </div>



                <div>
                    <label style="display: block; font-weight: 700; margin-bottom: 0.5rem; color: #555; font-size: 0.9rem;">Client ID (Stasiun)</label>
                    <input type="text" name="client_id" value="{{ api_creds.client_id }}" placeholder="Contoh: station-0001">
                </div>

                <div>
                    <label style="display: block; font-weight: 700; margin-bottom: 0.5rem; color: #555; font-size: 0.9rem;">Client Secret (Kunci API)</label>
                    <input type="text" name="client_secret" value="{{ api_creds.client_secret }}" placeholder="Masukkan kunci rahasia API">
                </div>

                <div>
                    <label style="display: block; font-weight: 700; margin-bottom: 0.5rem; color: #555; font-size: 0.9rem;">Running Text (Informasi)</label>
                    <input type="text" name="running_text" value="{{ settings.running_text }}" placeholder="Pesan berlari di dashboard">
                </div>

                <div>
                    <label style="display: block; font-weight: 700; margin-bottom: 0.5rem; color: #555; font-size: 0.9rem;">Jumlah Docking Slot</label>
                    <input type="number" name="total_slots" value="{{ settings.total_slots }}" min="1" max="24">
                </div>

                <button type="submit" class="save-btn">Simpan Semua Perubahan</button>
            </form>
        </div>
    </div>
    <script>
        function toggleNavModal() {
            const modal = document.getElementById('navModal');
            if (modal.style.display === 'none' || modal.style.display === '') {
                modal.style.display = 'flex';
            } else {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
